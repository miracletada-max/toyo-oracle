<script>
(function(){
  const el=document.getElementById('stars');
  let x=99991;const r=()=>{x=(x*1664525+1013904223)&0xffffffff;return(x>>>0)/4294967296;};
  for(let i=0;i<65;i++){const s=document.createElement('div');s.className='star';const sz=r()>.85?2:1;s.style.cssText='width:'+sz+'px;height:'+sz+'px;left:'+r()*100+'%;top:'+r()*100+'%;opacity:'+(0.1+r()*.7)+';animation:tw '+(2+r()*3)+'s ease-in-out infinite alternate;animation-delay:'+r()*5+'s';el.appendChild(s);}
})();
const WUXING={木:{gen:"火",ctrl:"土"},火:{gen:"土",ctrl:"金"},土:{gen:"金",ctrl:"水"},金:{gen:"水",ctrl:"木"},水:{gen:"木",ctrl:"火"}};
const ZS=["紫微","天機","太陽","武曲","天同","廉貞","天府","太陰","貪狼","巨門","天相","天梁","七殺","破軍"];
const PA=["命宮","兄弟宮","夫妻宮","子女宮","財帛宮","疾厄宮","遷移宮","奴僕宮","官禄宮","田宅宮","福徳宮","父母宮"];
const TG=["甲","乙","丙","丁","戊","己","庚","辛","壬","癸"];
const DZ=["子","丑","寅","卯","辰","巳","午","未","申","酉","戌","亥"];
const EL=["木","火","土","金","水"],BR=["廟","旺","得地","平和","落陷"];
const BA=["休門","死門","傷門","杜門","景門","驚門","開門","生門"];
const JX=["天蓬","天芮","天冲","天輔","天禽","天心","天柱","天任","天英"];
const JS=["値符","騰蛇","太陰","六合","白虎","玄武","九地","九天"];
const G9=["坎一宮","坤二宮","震三宮","巽四宮","中五宮","乾六宮","兌七宮","艮八宮","離九宮"];
const DR=["北","南西","東","南東","中央","北西","西","北東","南"];
const JI=["大吉","吉","中平","小吉","大凶","中平","小吉","大吉","吉"];
const TR=[{name:"乾",el:"金"},{name:"兌",el:"金"},{name:"離",el:"火"},{name:"震",el:"木"},{name:"巽",el:"木"},{name:"坎",el:"水"},{name:"艮",el:"土"},{name:"坤",el:"土"}];
const THEMES=["総合運","仕事・事業運","金運・財運","恋愛・結婚運","健康・生活運","人間関係","未来予測・転機"];
const FSTY={大吉:{c:"#ffd700",g:"rgba(255,215,0,.4)"},吉:{c:"#7ae0a0",g:"rgba(122,224,160,.4)"},中平:{c:"#87ceeb",g:"rgba(135,206,235,.3)"},注意:{c:"#ffaa55",g:"rgba(255,170,85,.4)"},要慎重:{c:"#ff7777",g:"rgba(255,119,119,.4)"}};
function calcZ(y,m,d,h){const ys=TG[(y-4)%10],yb=DZ[(y-4)%12],base=(y+m+d+h)&0x7fffffff,mi=(m+Math.floor(h/2))%12,ps=PA.map((_,i)=>({main:ZS[(base+i*3)%14],el:EL[(base+i*2)%5],br:BR[(base+i*7)%5]}));return{ys,yb,ming:ps[mi],cai:ps[(mi+4)%12],guan:ps[(mi+8)%12]};}
function calcQ(y,m,d,h){const base=(y+m+d)%9,hI=Math.floor(h/2)%8,gI=(base+hI)%9;return{gong:G9[base],gate:BA[hI],star:JX[gI],shen:JS[hI],ji:JI[(base+hI)%9],dir:DR[hI]};}
function calcM(y,m,d,h,mn){const up=TR[(y+m+d)%8],lo=TR[(y+m+d+h)%8],line=(y+m+d+h+mn)%6+1,even=h%2===0,ti=even?up:lo,yu=even?lo:up,r=WUXING[yu.el];let rel;if(r.gen===ti.el)rel={type:"生体",desc:"大吉"};else if(WUXING[ti.el].ctrl===yu.el)rel={type:"体剋用",desc:"半吉"};else if(WUXING[ti.el].gen===yu.el)rel={type:"体生用",desc:"吉"};else if(r.ctrl===ti.el)rel={type:"剋体",desc:"注意"};else rel={type:"比和",desc:"吉"};return{up,lo,line,ti,yu,rel};}

const SYS_DAILY=`あなたは東洋占術の鑑定師です。今日一日の運勢を現代語でまとめてください。全体の70%は温かく前向きな内容で、30%は「正直に言うと」「ここは気をつけて」という率直な注意点を必ず入れてください。必ずJSON形式のみで返答:
{"overall":"総合運2〜3文。うち1文は辛口の注意点","work":"仕事運1〜2文。改善すべき点も正直に","love":"恋愛運1〜2文。耳が痛いことも含めて","money":"金運1文。甘い見通しを戒める言葉も","health":"健康運1文","lucky_color":"色名","lucky_direction":"方角","fortune_level":"大吉か吉か中平か注意か要慎重","word":"今日の一言20字以内"}`;
const SYS_MEIMEI=`あなたは東洋占術（紫微斗数・奇門遁甲・梅花心易）の鑑定師です。現代的でわかりやすい言葉で鑑定してください。全体の70%は温かく共感的、30%は率直で辛口の視点を入れてください。「正直に言うと」「ここだけは見直してほしい」など愛ある本音を伝えてください。必ずJSON形式のみで返答:
{"ziwei":"紫微斗数3〜4文。うち1文は命宮が陥りやすい課題を率直に","qimen":"奇門遁甲3〜4文。やってはいけないことも明記","meihua":"梅花心易3〜4文。卦が示すリスクも正直に","integrated":"三術統合5〜7文。相談に答えながら現実的な課題も","fortune_level":"大吉か吉か中平か注意か要慎重","key_message":"核心の一言25字以内","action":"今すぐできるアクション1つ（やめるべきことでも可）"}`;
const SYS_MONTHLY=`あなたは東洋占術の大師です。温かく現代的な日本語でしっかりとした鑑定をしてください。全体の70〜75%は前向きで温かい内容、25〜30%は率直で辛口の視点を含めてください。「本当のことを言います」「ここだけは変えないと」など愛ある厳しい言葉が人の背中を押します。必ずJSON形式のみで返答:
{"ziwei":"紫微斗数180字以上。命宮の課題・陥りやすいパターンも率直に","qimen":"奇門遁甲180字以上。警告すべき点も","meihua":"梅花心易180字以上。注意点・リスクも明確に","integrated":"三術統合深層鑑定400字以上。うち100字以上は率直な課題指摘・改善点を愛を持って","fortune_level":"大吉か吉か中平か注意か要慎重","key_message":"核心の一言28字以内","action":"開運行動3つ箇条書き。うち1つは今すぐやめるべきこと"}`;
const SYS_PREMIUM=`あなたは東洋占術の最高峰の大師です。プレミアム特別鑑定です。深く詩的で具体的な現代語で魂に響く長文の鑑定書を作成してください。全体の70%は温かく深い内容、30%は率直で辛口の本音を入れてください。「星は嘘をつきません」「本当のことを言います」など愛ある厳しい言葉を要所に入れてください。必ずJSON形式のみで返答:
{"soul":"天命の読み解き350字以上。才能と同時に魂の課題・克服すべき弱点も率直に","past":"過去の流れ300字以上。繰り返しているパターンや手放すべき執着も指摘","present":"現在の状況300字以上。耳が痛い現実も愛を持って伝える","future":"未来の展望350字以上。明るい未来とそのために変えなければならないことを具体的に","action":"行動指針300字以上。今すぐやめるべきことも含む","message":"特別メッセージ250字以上。甘やかしではなく本当に大切なことを伝える言葉で","fortune_level":"大吉か吉か中平か注意か要慎重","key_message":"核心の一言30字以内"}`;

function getSys(s){if(s==='daily')return SYS_DAILY;if(s==='meimei')return SYS_MEIMEI;if(s==='monthly')return SYS_MONTHLY;return SYS_PREMIUM;}
function fallback(svc,f,z,q,mh){
  if(svc==='daily')return{overall:"今日の運気は「"+q.ji+"」。"+q.gate+"が開き"+q.star+"があなたを照らします。正直に言うと、今日は気が散りやすいので大切な決断は避けた方が賢明です。",work:q.dir+"方向からの縁が吉。ただし先週のやり残しに正直に向き合う日でもあります。",love:"素直な一言が鍵。ただし感情任せの発言には注意してください。",money:"小さな積み重ねが吉。衝動買いは今日は特に避けて。",health:"水分補給を忘れずに。",lucky_color:["赤","黄","青","白","緑","金","紫"][new Date().getDay()%7],lucky_direction:q.dir+"方",fortune_level:q.ji==="大吉"?"大吉":q.ji==="吉"?"吉":"中平",word:"焦りが最大の敵"};

  const prompt=svc==='daily'?cy+"年"+cm+"月"+cd+"日（"+dow+"曜）\n生年月日:"+bd+"\n紫微:年干支:"+z.ys+z.yb+" 命星:"+z.ming.main+"("+z.ming.br+")\n奇門:日門:"+qm.gate+" 日星:"+qm.star+" 吉凶:"+qm.ji+" 吉方:"+qm.dir+"方\n梅花:"+mh.up.name+mh.lo.name+"卦 体用:"+mh.rel.type+"\n今日一日の運勢を三術で鑑定してください。":"【依頼者】"+(nm||"匿名")+" 性別:"+gd+" 生年月日:"+bd+" "+bt+" 出生地:"+bp+" テーマ:"+th+"\n相談:"+q+"\n紫微:年干支:"+z.ys+z.yb+" 命宮:"+z.ming.main+"("+z.ming.br+") 財帛宮:"+z.cai.main+" 官禄宮:"+z.guan.main+"\n奇門:時門:"+qm.gate+" 時星:"+qm.star+" 吉凶:"+qm.ji+" 吉方:"+qm.dir+"方\n梅花:"+mh.up.name+mh.lo.name+"卦 体用:"+mh.rel.type+":"+mh.rel.desc+" 変爻:第"+mh.line+"爻\n三術を統合し鑑定してください。";
  const maxTok={daily:800,meimei:900,monthly:1600,premium:2200}[svc];
  const loads={daily:["干支を算出中…","日盤を展開中…","運勢を読み解き中…"],meimei:["命盤を算出中…","時盤を展開中…","三術を統合中…"],monthly:["命盤を精密算出中…","三術を統合中…","鑑定書を作成中…"],premium:["深層を読み解き中…","魂のメッセージを解読中…","特別鑑定書を作成中…"]}[svc];
  let li=0;set({step:'loading',err:'',loadMsg:loads[0]});
  const ti=setInterval(()=>{li=(li+1)%loads.length;STATE.loadMsg=loads[li];const el=document.querySelector('[style*="animation:pu"]');if(el)el.textContent=loads[li];},1400);
  let ai;
  try{const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:maxTok,system:getSys(svc),messages:[{role:'user',content:prompt}]})});
  if(res.ok){const data=await res.json();const raw=(data.content||[]).map(b=>b.text||'').join('');try{ai=JSON.parse(raw.replace(/^```json|^```|```$/gm,'').trim());}catch{ai=fallback(svc,form,z,qm,mh);}}else{ai=fallback(svc,form,z,qm,mh);}}catch{ai=fallback(svc,form,z,qm,mh);}
  clearInterval(ti);
  set({step:'result',result:{id:Date.now(),date:new Date().toLocaleString('ja-JP'),svc,form,z,qm,mh,ai}});}
render();
